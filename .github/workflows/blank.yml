name: Daily Commit

on:
  schedule:
    - cron: '0 18 * * *'  # 11:30 PM IST
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Make changes
        run: echo "Updated on $(date)" >> log.txt

      - name: Commit and Push
        run: |
          git config --global user.name "ravishete26"
          git config --global user.email "ravishete261999@gmail.com"
          git add .
          git commit -m "Daily auto update" || echo "No changes"
          git push
